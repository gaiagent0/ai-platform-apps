name: meetcore

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: meetcore-backend:latest
    container_name: meetcore-backend
    ports:
      - "5167:5167"  # FastAPI backend
      - "8012:8012"  # MCP server (configurable via MEETCORE_MCP_PORT)
    volumes:
      - meetcore-data:/data
    env_file:
      - .env
    environment:
      - MEETCORE_BACKEND_PORT=5167
      - MEETCORE_MCP_PORT=8012
      - MEETCORE_DATABASE_URL=sqlite+aiosqlite:///./meeting_minutes.db
      - MEETCORE_GENIEX_API_URL=${GENIEX_BASE_URL:-http://host.docker.internal:8912/v1}
      - MEETCORE_LITELLM_BASE_URL=${LITELLM_BASE_URL:-http://host.docker.internal:4001}
      - MEETCORE_WHISPER_LANGUAGE=${WHISPER_LANGUAGE:-hu}
      - MEETCORE_CORS_ORIGINS=["http://localhost:3118","http://localhost:3000"]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5167/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    networks:
      - meetcore-net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        BACKEND_URL: http://backend:5167
        NEXT_PUBLIC_API_URL: http://localhost:5167
    image: meetcore-frontend:latest
    container_name: meetcore-frontend
    ports:
      - "3118:3000"
    environment:
      - BACKEND_URL=http://backend:5167
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - meetcore-net
    profiles:
      - frontend
      - full

volumes:
  meetcore-data:
    driver: local

networks:
  meetcore-net:
    driver: bridge
